name: Build and Deploy to Amazon ECS

# ---------------------------------------------------------------------------
# What this pipeline does, in order:
#   1. Checks out the code
#   2. Configures AWS credentials from GitHub secrets
#   3. Logs in to Amazon ECR
#   4. Builds the Docker image and pushes it to ECR (tagged with the git SHA)
#   5. Renders a new ECS task definition with the freshly pushed image
#   6. Deploys the task definition to the ECS service and waits for stability
#
# Trigger: every push to the "main" branch (plus a manual "Run workflow" button).
# ---------------------------------------------------------------------------

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

# These values must match the resources you create in AWS_DEPLOYMENT.md.
env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: aws-container
  ECS_CLUSTER: aws-container-cluster
  ECS_SERVICE: aws-container-service
  ECS_TASK_DEFINITION: aws-container-task
  CONTAINER_NAME: aws-container-web

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # Pull the CURRENT task definition from AWS so we only swap the image and
      # keep every other setting (env vars, roles, cpu/memory) intact.
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_TASK_DEFINITION }}" \
            --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
